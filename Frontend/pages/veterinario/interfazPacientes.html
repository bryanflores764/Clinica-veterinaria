<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../assets/icons/Logo-de-clínica-Veterinaria-azul.ico" type="image/x-icon">
    <link rel="stylesheet" href="../../css/veterinario/interfazPacientes.css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400..800&display=swap" rel="stylesheet">
    <title>Veterinario - Pacientes</title>
</head>
<body>
    <div class="layout">

        <aside class="sidebar">
            <div class="logo">
                <img id="logo" src="../../assets/img/Logo de clínica Veterinaria azul.png" alt="logo">
            </div>
            <ul>
                <li>
                    <a href="#">
                        <img src="../../assets/icons/icon-citas.svg" alt="citas">
                        Citas
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="../../assets/icons/icon-pacientes.svg" alt="pacientes">
                        Pacientes
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="../../assets/icons/icon-historial.svg" alt="historial">
                        Historial Citas
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="../../assets/icons/icon-medicina.svg" alt="tratamiento">
                        Tratamientos
                    </a>
                </li>
                
            </ul>
        </aside>

        <header class="header">
            <h1>Pacientes</h1>
            <button class="menu-toggle" aria-label="Abrir-menu" aria-expanded="false">
                ☰
            </button>
            <div class="header-actions">
                <a href="" class="btn-logout" id="cerrar-sesion">
                    <img src="../../assets/icons/icon-sesion.svg" alt="CerrarSession">
                    Cerrar Sesion
                </a>
            </div>
        </header>

        <main class="main">

            <section class="main-container">

                <div class="table-container">

                    <div class="table-header">
                        <input id="search" class="search" type="text" placeholder="Buscar por nombre o propietario">
                    </div>

                    <div class="table-wrapper">
                        <table class="users-table">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Especie</th>
                                    <th>Raza</th>
                                    <th>Peso (lbs)</th>
                                    <th>Fecha de nacimiento</th>
                                    <th>Propietario</th>
                                    <th class="actions-col">Acciones</th>
                                </tr>
                            </thead>

                            <tbody id="users-tbody">
                                <!-- JS inyecta filas -->
                            </tbody>
                        </table>
                    </div>

                    <p id="empty-msg" class="empty-msg" style="display:none;">No hay pacientes para mostrar</p>

                </div>

            </section>

        </main>

    </div>
    <script src="../../js/veterinario/logout.js"></script>
    <script src="../../js/veterinario/interfazPacientes.js"></script>
</body>
</html>
