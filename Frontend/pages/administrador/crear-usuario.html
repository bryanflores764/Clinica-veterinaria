<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetCare - Crear Usuario</title>

    <link rel="icon" type="image/x-icon" href="../assets/icons/Logo-de-clínica-Veterinaria-azul.ico">

    <!-- Fuente VetCare -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../css/administrador/crear-usuario.css">
</head>

<body>

    <!-- Botón hamburguesa para móvil -->
    <button class="menu-toggle" id="menuToggle" type="button">☰</button>

    <!-- Fondo oscuro para móvil -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <main class="layout">

        <aside class="sidebar">

            <a href="interfazAdmin.html" class="logo-container">
                <img 
                    src="../../assets/img/Logo de clínica Veterinaria azul.png" 
                    alt="Logo de VetCare" 
                    class="logo-img"
                >
            </a>

            <nav class="menu-lateral">

                <div class="menu-grupo">
                    <a href="#" class="item">
                        <img src="../../assets/icons/icon-user.svg" alt="" class="menu-icon">
                        <span>Gestión de usuarios</span>
                    </a>

                    <div class="submenu">
                        <a href="ver-usuario.html" class="sub-item">Ver usuarios</a>
                        <a href="crear-usuario.html" class="sub-item">Crear usuario</a>
                    </div>
                </div>

                <div class="menu-grupo">
                    <a href="#" class="item">
                        <img src="../../assets/icons/icon-user.svg" alt="" class="menu-icon">
                        <span>Gestión de clientes</span>
                    </a>

                    <div class="submenu">
                        <a href="ver-cliente.html" class="sub-item">Ver clientes</a>
                        <a href="crear-cliente.html" class="sub-item">Crear cliente</a>
                    </div>
                </div>

                <div class="menu-grupo">
                    <a href="#" class="item">
                        <img src="../../assets/icons/icon-pacientes.svg" alt="" class="menu-icon">
                        <span>Gestión de mascotas</span>
                    </a>

                    <div class="submenu">
                        <a href="ver-mascota.html" class="sub-item">Ver mascotas</a>
                        <a href="crear-mascota.html" class="sub-item active">Crear mascota</a>
                    </div>
                </div>

                <div class="menu-grupo">
                    <a href="historial-acciones.html" class="item">
                        <img src="../../assets/icons/icon-user.svg" alt="" class="menu-icon">
                        <span>Historial de acciones</span>
                    </a>
                </div>

                <div class="menu-grupo">
                    <a href="reportes-ventas.html" class="item">
                        <img src="../../assets/icons/icon-user.svg" alt="" class="menu-icon">
                        <span>Reportes de ventas</span>
                    </a>
                </div>
                 <div class="menu-grupo">
                    <a href="#" class="item">
                        <img src="../../assets/icons/icon-pacientes.svg" alt="" class="menu-icon">
                        <span>Tipos de Consulta</span>
                    </a>

                    <div class="submenu">
                        <a href="gestion-tipoconsulta.html" class="sub-item">Gestionar tipos</a>
                    </div>
                </div>

            </nav>

        </aside>

        <section class="main-container">

            <header class="topbar">
                <div>
                    <h1>Crear Usuario</h1>
                    <p class="descripcion-panel">
                        Registra nuevos usuarios para el sistema VetCare.
                    </p>
                </div>

                <a href="../../index.html" class="btn-cerrar-sesion">
                    <img src="../../assets/icons/icon-sesion.svg" alt="" class="btn-icon">
                    <span>Cerrar sesión</span>
                </a>
            </header>

            <div class="form-container">

                <form id="crearUsuarioForm">

                    <div class="form-group">

                        <div class="usuario-componente">
                            <label for="nombreUsuario">Nombre de usuario:</label>
                            <input type="text" id="nombreUsuario" name="nombreUsuario" required>
                        </div>

                        <div class="contrasenia-componente">
                            <label for="contrasenia">Contraseña:</label>
                            <input type="password" id="contrasenia" name="contrasenia" required>
                        </div>

                        <div class="rol-componente">
                            <label for="rol">Rol:</label>
                            <select id="rol" name="rol" required>
                                <option value="">Seleccione un rol</option>
                                <option value="1">Administrador</option>
                                <option value="3">Recepcionista</option>
                                <option value="2">Veterinario</option>
                            </select>
                        </div>

                        <div class="correo-componente">
                            <label for="correo">Correo:</label>
                            <input type="email" id="correo" name="correo" required>
                        </div>

                        <button type="submit" class="btn-crear">Crear Usuario</button>

                    </div>

                </form>

            </div>

        </section>

    </main>

    <script src="../../js/administrador/interfazAdmin.js"></script>
    <script src="../../js/administrador/crear-usuario.js"></script>
</body>

</html>
