<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetCare - Administrador</title>
    <link rel="icon" type="image/x-icon" href="../assets/icons/Logo-de-clínica-Veterinaria-azul.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../../css/administrador/ver-usuario.css">
</head>

<body>

    <main class="layout">

        <aside class="sidebar">

            <a href="interfazAdmin.html" class="logo"><img src="../../assets/img/Logo de clínica Veterinaria azul.png"
                    alt="Logo de VetCare" class="logo"></a>

            <nav class="menu-lateral">

                <div class="menu-grupo">
                    <a href="#" class="item">Gestión de usuarios</a>

                    <div class="submenu">
                        <a href="ver-usuario.html" class="sub-item">Ver usuarios</a>
                        <a href="crear-usuario.html" class="sub-item">Crear usuario</a>
                    </div>
                </div>

                <div class="menu-grupo">
                    <a href="#" class="item">Gestión de clientes</a>
                    <div class="submenu">
                        <a href="#" class="sub-item">Ver clientes</a>
                        <a href="#" class="sub-item">Crear cliente</a>
                    </div>
                </div>

                <div class="menu-grupo">
                    <a href="#" class="item">Gestión de mascotas</a>
                    <div class="submenu">
                        <a href="#" class="sub-item">Ver mascotas</a>
                        <a href="#" class="sub-item">Crear mascota</a>
                    </div>
                </div>

                <div class="menu-grupo">
                    <a href="#" class="item">Sistema</a>
                    <div class="submenu">
                        <a href="../../index.html" class="sub-item">Cerrar sesión</a>
                    </div>
                </div>

            </nav>

        </aside>

        <section class="main-container">
            <h1>Ver Usuario</h1>

            <div class="table-container">

                <div class="table-header">
                    <h2 class="table-title">Usuarios registrados</h2>
                    <input id="search" class="search" type="text" placeholder="Buscar por usuario, correo o rol...">
                </div>

                <div class="table-wrapper">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Correo</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th class="actions-col">Acciones</th>
                            </tr>
                        </thead>

                        <tbody id="users-tbody">
                            <!-- JS inyecta filas -->
                        </tbody>
                    </table>
                </div>

                <p id="empty-msg" class="empty-msg" style="display:none;">No hay usuarios para mostrar.</p>

            </div>

        </section>

    </main>
    <script src="../../js/administrador/interfazAdmin.js"></script>
    <script src="../../js/administrador/ver-usuario.js"></script>
</body>

</html>
