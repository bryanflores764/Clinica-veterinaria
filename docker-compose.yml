services:
  mysql:
    image: mysql:8
    container_name: mysql_vetcare
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: vetcare
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_vetcare_data:/var/lib/mysql

volumes:
  mysql_vetcare_data:
